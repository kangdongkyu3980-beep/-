<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBS 룸 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f0f2f5; --surface:#fff; --surface2:#f7f8fa; --border:#e2e6ed; --border2:#d0d5df;
  --text:#1a1d27; --text2:#6b7280; --text3:#9ca3af;
  --accent:#2563eb; --accent-light:#eff4ff;
  --green:#16a34a; --green-light:#f0fdf4;
  --orange:#ea580c; --orange-light:#fff7ed;
  --red:#dc2626; --red-light:#fef2f2;
  --teal:#0891b2; --teal-light:#ecfeff;
  --yellow:#ca8a04; --yellow-light:#fefce8;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.1),0 2px 4px rgba(0,0,0,.05);
  --shadow-lg:0 10px 30px rgba(0,0,0,.15);
  --r:12px; --r-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

/* HEADER */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;height:58px;position:sticky;top:0;z-index:200;box-shadow:var(--shadow);gap:12px}
.header-logo{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600;color:var(--accent);letter-spacing:1px}
.header-date{font-size:12px;color:var(--text2);background:var(--surface2);padding:5px 12px;border-radius:20px;border:1px solid var(--border)}
.header-actions{margin-left:auto;display:flex;gap:8px;align-items:center}

/* NAV */
.nav{display:flex;gap:2px;padding:0 28px;background:var(--surface);border-bottom:1px solid var(--border)}
.nav-tab{padding:12px 18px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;user-select:none}
.nav-tab:hover{color:var(--text)}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* MAIN */
.main{padding:24px 28px;max-width:1400px}
.panel{display:none}
.panel.active{display:block}

/* ALERT BANNER */
.alert-banner{border-radius:var(--r-sm);padding:10px 16px;margin-bottom:10px;display:flex;align-items:center;gap:10px;font-size:13px}
.ab-warn{background:var(--yellow-light);border:1px solid #fde047}
.ab-warn .ab-text{color:var(--yellow)}
.ab-out{background:var(--red-light);border:1px solid #fca5a5}
.ab-out .ab-text{color:var(--red)}
.ab-text{flex:1}
.ab-link{font-size:12px;font-weight:600;cursor:pointer;text-decoration:underline;white-space:nowrap;margin-left:8px}
.ab-warn .ab-link{color:var(--yellow)}
.ab-out .ab-link{color:var(--red)}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:13px;margin-bottom:18px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:17px 19px;box-shadow:var(--shadow)}
.kpi-icon{font-size:19px;margin-bottom:7px}
.kpi-label{font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.kpi-main{display:flex;align-items:baseline;gap:5px;margin-bottom:3px}
.kpi-value{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:600;line-height:1}
.kpi-denom{font-size:13px;color:var(--text2);font-family:'JetBrains Mono',monospace}
.kpi-sub{font-size:11px;color:var(--text3)}
.kpi-bar{height:4px;background:var(--border);border-radius:2px;margin-top:10px;overflow:hidden}
.kpi-bar-fill{height:100%;border-radius:2px;transition:width .8s ease}
.kpi-blue .kpi-value{color:var(--accent)} .kpi-blue .kpi-bar-fill{background:var(--accent)}
.kpi-green .kpi-value{color:var(--green)} .kpi-green .kpi-bar-fill{background:var(--green)}
.kpi-orange .kpi-value{color:var(--orange)} .kpi-orange .kpi-bar-fill{background:var(--orange)}
.kpi-teal .kpi-value{color:var(--teal)} .kpi-teal .kpi-bar-fill{background:var(--teal)}
.kpi-yellow .kpi-value{color:var(--yellow)} .kpi-yellow .kpi-bar-fill{background:var(--yellow)}

/* ── PROPERTY SWITCHER (핵심 UI) ── */
.property-switcher{display:flex;gap:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);margin-bottom:18px}
.prop-btn{flex:1;padding:16px 20px;border:none;background:transparent;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:500;color:var(--text2);transition:all .15s;display:flex;align-items:center;gap:10px;border-right:1px solid var(--border);position:relative}
.prop-btn:last-child{border-right:none}
.prop-btn:hover{background:var(--surface2)}
.prop-btn.active{background:var(--accent-light);color:var(--accent)}
.prop-btn.active-ibs{background:var(--teal-light);color:var(--teal)}
.prop-btn-icon{font-size:22px}
.prop-btn-info{text-align:left;flex:1}
.prop-btn-title{font-weight:700;font-size:14px}
.prop-btn-sub{font-size:11px;margin-top:1px;opacity:.7}
.prop-btn-badge{font-family:'JetBrains Mono',monospace;font-size:12px;padding:3px 10px;border-radius:12px;font-weight:600}
.prop-btn.active .prop-btn-badge{background:rgba(37,99,235,.12);color:var(--accent)}
.prop-btn.active-ibs .prop-btn-badge{background:rgba(8,145,178,.12);color:var(--teal)}
.prop-btn:not(.active):not(.active-ibs) .prop-btn-badge{background:var(--surface2);color:var(--text2)}
.prop-indicator{position:absolute;bottom:0;left:0;right:0;height:3px;border-radius:0}
.prop-btn.active .prop-indicator{background:var(--accent)}
.prop-btn.active-ibs .prop-indicator{background:var(--teal)}

/* OCC SECTION */
.occ-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;box-shadow:var(--shadow);margin-bottom:18px}
.occ-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.occ-card-title{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px}
.legend{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.legend-dot{width:9px;height:9px;border-radius:50%}
.ld-occ{background:var(--accent)} .ld-up{background:var(--orange)}
.ld-long{background:var(--green)} .ld-conf{background:var(--red)} .ld-empty{background:var(--border2)}

.occ-rooms{display:flex;flex-wrap:wrap;gap:7px}
.occ-chip{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;font-size:12px;font-family:'JetBrains Mono',monospace;border:1.5px solid var(--border);cursor:pointer;transition:all .15s;user-select:none}
.occ-chip:hover{transform:translateY(-1px);box-shadow:var(--shadow-md)}
.chip-occ{background:var(--accent-light);border-color:var(--accent);color:var(--accent)}
.chip-up{background:var(--orange-light);border-color:var(--orange);color:var(--orange)}
.chip-long{background:var(--green-light);border-color:var(--green);color:var(--green)}
.chip-conf{background:var(--red-light);border-color:var(--red);color:var(--red)}
.chip-empty{background:var(--surface2);color:var(--text3)}
.chip-dot{width:7px;height:7px;border-radius:50%}
.dot-occ{background:var(--accent)} .dot-up{background:var(--orange)}
.dot-long{background:var(--green)} .dot-conf{background:var(--red)} .dot-empty{background:var(--text3)}

/* QUICK ADD */
.quick-add-card{background:var(--surface);border:1.5px dashed var(--border2);border-radius:var(--r);padding:16px 20px;margin-bottom:18px;box-shadow:var(--shadow)}
.quick-add-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px}
.qa-grid{display:grid;grid-template-columns:1.2fr 1fr 1fr 1fr 1fr auto;gap:9px;align-items:end}
@media(max-width:900px){.qa-grid{grid-template-columns:1fr 1fr}}

/* TWO COL */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:800px){.two-col{grid-template-columns:1fr}}

/* LIST CARD */
.list-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
.list-card-header{padding:12px 16px;border-bottom:1px solid var(--border);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text2)}
.list-item{padding:9px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px;transition:background .1s;cursor:pointer}
.list-item:last-child{border-bottom:none}
.list-item:hover{background:var(--surface2)}
.day-badge{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;min-width:40px;text-align:center;flex-shrink:0}
.badge-in{background:var(--green-light);color:var(--green)}
.badge-out{background:var(--orange-light);color:var(--orange)}
.badge-today{background:var(--red-light);color:var(--red)}
.bldg-tag{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600;flex-shrink:0}
.tag-gh{background:var(--accent-light);color:var(--accent)}
.tag-ibs{background:var(--teal-light);color:var(--teal)}

/* ── ROOM MAP ── */
.roommap-layout{display:grid;grid-template-columns:220px 1fr;gap:16px;align-items:start}
@media(max-width:900px){.roommap-layout{grid-template-columns:1fr}}
.bldg-selector{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
.bldg-selector-header{padding:12px 16px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text2)}
.bldg-btn{width:100%;padding:12px 16px;display:flex;align-items:center;gap:10px;border:none;background:transparent;cursor:pointer;border-bottom:1px solid var(--border);font-family:'Noto Sans KR',sans-serif;font-size:13px;color:var(--text);text-align:left;transition:all .15s}
.bldg-btn:last-child{border-bottom:none}
.bldg-btn:hover{background:var(--surface2)}
.bldg-btn.active-gh{background:var(--accent-light);color:var(--accent)}
.bldg-btn.active-ibs-btn{background:var(--teal-light);color:var(--teal)}
.bldg-icon{font-size:17px}
.bldg-info{flex:1}
.bldg-name{font-weight:600;font-size:13px}
.bldg-detail{font-size:10px;color:var(--text3);margin-top:1px}
.bldg-btn.active-gh .bldg-detail,.bldg-btn.active-ibs-btn .bldg-detail{opacity:.6}
.bldg-count{font-family:'JetBrains Mono',monospace;font-size:11px;padding:2px 8px;border-radius:10px;background:var(--surface2);color:var(--text2)}
.bldg-btn.active-gh .bldg-count{background:rgba(37,99,235,.12);color:var(--accent)}
.bldg-btn.active-ibs-btn .bldg-count{background:rgba(8,145,178,.12);color:var(--teal)}

.bldg-group-label{padding:8px 16px 5px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);background:var(--surface2);border-bottom:1px solid var(--border)}

.room-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
.room-panel-header{padding:14px 18px;border-bottom:1px solid var(--border);background:var(--surface2);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
.room-panel-title{font-size:15px;font-weight:700}
.room-panel-sub{font-size:12px;color:var(--text2);margin-top:2px}
.rooms-grid{padding:16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(138px,1fr));gap:9px}

/* ROOM CARD */
.room-card{border:1.5px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;transition:all .15s;position:relative;background:var(--surface);min-height:92px;display:flex;flex-direction:column}
.room-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.rc-occ{border-color:var(--accent);background:var(--accent-light)}
.rc-up{border-color:var(--orange);background:var(--orange-light)}
.rc-long{border-color:var(--green);background:var(--green-light)}
.rc-conf{border-color:var(--red);background:var(--red-light)}
.rc-empty{border-color:var(--border2);background:var(--surface2)}
.room-number{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;margin-bottom:5px}
.rc-occ .room-number{color:var(--accent)}
.rc-up .room-number{color:var(--orange)}
.rc-long .room-number{color:var(--green)}
.rc-conf .room-number{color:var(--red)}
.rc-empty .room-number{color:var(--text3)}
.room-guest{font-size:12px;font-weight:600;color:var(--text);line-height:1.3}
.room-company{font-size:10px;color:var(--text2);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.room-dates{font-size:10px;color:var(--text3);margin-top:3px;font-family:'JetBrains Mono',monospace}
.room-nights{font-size:10px;font-weight:600;margin-top:2px}
.rc-occ .room-nights{color:var(--accent)} .rc-up .room-nights{color:var(--orange)} .rc-long .room-nights{color:var(--green)}
.room-next{font-size:11px;font-weight:600;color:var(--orange);margin-top:5px;border-top:1px solid rgba(234,88,12,.25);padding-top:5px;background:rgba(234,88,12,.07);border-radius:4px;padding:4px 6px;margin-top:6px}
.room-long-badge{display:inline-block;font-size:9px;font-weight:700;background:var(--green);color:#fff;padding:1px 6px;border-radius:4px;margin-top:3px}
.room-empty-label{font-size:12px;color:var(--text3);margin-top:auto;padding-top:6px}
.edit-btn-small{position:absolute;top:7px;right:7px;background:rgba(255,255,255,.9);border:1px solid var(--border);border-radius:5px;cursor:pointer;font-size:12px;opacity:0;transition:opacity .15s;padding:2px 5px;line-height:1}
.room-card:hover .edit-btn-small{opacity:1}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:16px;width:100%;max-width:540px;box-shadow:var(--shadow-lg);display:flex;flex-direction:column;max-height:90vh;animation:mIn .2s ease;margin:auto}
@keyframes mIn{from{opacity:0;transform:translateY(6px) scale(.98)}to{opacity:1;transform:none}}
.modal-header{padding:17px 22px 13px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0}
.modal-title{font-size:15px;font-weight:700}
.modal-room-tag{font-family:'JetBrains Mono',monospace;font-size:12px;padding:3px 10px;border-radius:6px;margin-top:4px;display:inline-block}
.tag-room-gh{background:var(--accent-light);color:var(--accent)}
.tag-room-ibs{background:var(--teal-light);color:var(--teal)}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text2);padding:4px;line-height:1;flex-shrink:0}
.modal-close:hover{color:var(--text)}
.modal-body{padding:18px 22px;overflow-y:auto;flex:1}
.modal-footer{padding:13px 22px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}

/* BOOKING ENTRY */
.booking-entry{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px}
.booking-entry-header{display:flex;align-items:flex-start;gap:8px}
.booking-entry-main{flex:1}
.booking-entry-name{font-weight:600;font-size:13px}
.booking-entry-meta{font-size:11px;color:var(--text2);margin-top:2px}
.booking-entry-status{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;flex-shrink:0;margin-top:1px}
.st-active{background:var(--accent-light);color:var(--accent)}
.st-long{background:var(--green-light);color:var(--green)}
.st-upcoming{background:var(--orange-light);color:var(--orange)}
.st-past{background:var(--surface2);color:var(--text3);border:1px solid var(--border)}
.booking-entry-actions{display:flex;gap:6px;margin-top:8px}
.booking-edit-form{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:none}
.booking-edit-form.open{display:block}

/* FORM */
.form-row{margin-bottom:12px}
.form-label{display:block;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.form-input,.form-select{width:100%;padding:9px 13px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:13px;font-family:'Noto Sans KR',sans-serif;background:var(--surface);color:var(--text);outline:none;transition:border-color .15s}
.form-input:focus,.form-select:focus{border-color:var(--accent)}
.date-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.section-divider{font-size:12px;font-weight:700;color:var(--text);margin:13px 0 11px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}

/* LONGTERM TOGGLE */
.longterm-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:10px 13px;background:var(--green-light);border:1.5px solid var(--green);border-radius:var(--r-sm)}
.longterm-row label{font-size:13px;color:var(--green);font-weight:600;cursor:pointer;flex:1}
.toggle{position:relative;flex:1;height:28px;min-width:60px}
.toggle input{opacity:0;position:absolute;width:100%;height:100%;margin:0;cursor:pointer;z-index:2}
.toggle-slider{position:absolute;inset:0;background:var(--border2);border-radius:14px;cursor:pointer;transition:.3s}
.toggle-slider:before{content:'';position:absolute;height:22px;width:22px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.3s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle input:checked+.toggle-slider{background:var(--green)}
.toggle input:checked+.toggle-slider:before{left:calc(100% - 25px)}

/* BUTTONS */
.btn{padding:8px 17px;border-radius:var(--r-sm);font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:'Noto Sans KR',sans-serif;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#1d4ed8}
.btn-ghost{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--border);color:var(--text)}
.btn-danger{background:transparent;color:var(--red);border:1px solid rgba(220,38,38,.3)}
.btn-danger:hover{background:var(--red);color:#fff;border-color:var(--red)}
.btn-sm{padding:4px 10px;font-size:11px}

/* GUESTS TABLE */
.search-wrap{position:relative;margin-bottom:11px}
.search-wrap input{width:100%;padding:10px 16px 10px 38px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:13px;background:var(--surface);color:var(--text);outline:none;font-family:'Noto Sans KR',sans-serif}
.search-wrap input:focus{border-color:var(--accent)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px}
.filter-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:11px}
.fchip{padding:5px 13px;border-radius:20px;font-size:12px;cursor:pointer;border:1.5px solid var(--border);color:var(--text2);background:var(--surface);transition:all .15s}
.fchip:hover{border-color:var(--accent);color:var(--accent)}
.fchip.on{background:var(--accent);border-color:var(--accent);color:#fff}
.sort-th{display:flex;align-items:center;gap:4px;cursor:pointer;user-select:none;white-space:nowrap}
.sort-th:hover{color:var(--accent)}
.sort-arr{font-size:10px;color:var(--text3)}
.sort-arr.active{color:var(--accent)}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{padding:10px 13px;background:var(--surface2);text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--text2);font-weight:700;border-bottom:1px solid var(--border)}
tbody td{padding:10px 13px;border-bottom:1px solid var(--border);color:var(--text);font-size:13px;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--surface2)}
.mono{font-family:'JetBrains Mono',monospace;font-size:11px}
.status-pill{padding:3px 9px;border-radius:10px;font-size:11px;font-weight:600}
.sp-active{background:var(--accent-light);color:var(--accent)}
.sp-long{background:var(--green-light);color:var(--green)}
.sp-upcoming{background:var(--orange-light);color:var(--orange)}
.sp-past{background:var(--surface2);color:var(--text3);border:1px solid var(--border)}
.sp-confirm{background:var(--red-light);color:var(--red)}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}

async function apiGet() {
  if (!SCRIPT_URL) return null;
  try {
    const res = await fetch(SCRIPT_URL + '?action=getAll');
    const json = await res.json();
    return json.ok ? json.data : null;
  } catch(e) { console.warn('API GET 실패:', e); return null; }
}

async function apiPost(body) {
  if (!SCRIPT_URL) return { ok: false, error: 'URL 미설정' };
  try {
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify(body)
    });
    return await res.json();
  } catch(e) { return { ok: false, error: e.message }; }
}

// ── Helpers ──
function pd(s){if(!s||s.length!==10)return null;const d=new Date(s+'T00:00:00');return isNaN(d)?null:d}
function fmtD(s){const d=pd(s);if(!d)return s||'—';return`${d.getMonth()+1}/${d.getDate()}`}
function nights(b){const ci=pd(b.check_in),co=pd(b.check_out);if(!ci||!co)return null;const n=Math.round((co-ci)/86400000);return n>0?n+'박':null}
function diff(d1,d2){return Math.round((d2-d1)/86400000)}

// STATUS: active | longterm | upcoming | past | confirm | unknown
function statusOf(b){
  const ci=pd(b.check_in), co=pd(b.check_out);
  if(!ci) return 'unknown';
  if(b.longterm) return ci<=TODAY ? 'longterm' : 'upcoming';   // 장기투숙 플래그
  if(!co||b.check_out==='') return ci<=TODAY ? 'confirm' : 'upcoming'; // 날짜없고 장기투숙 아님 = 확인필요
  if(ci>TODAY) return 'upcoming';
  if(co<=TODAY) return 'past';
  return 'active';
}

    } else if(st==='upcoming'){
      inner=`<div class="room-number">${r}</div>
        <div class="room-guest">${nxt.name||'?'}${ddayBadge(nxt.check_in)}</div>
        <div class="room-company">${nxt.company||''}</div>
        <div class="room-dates">${fmtD(nxt.check_in)} 체크인</div>`;
    } else {
      inner=`<div class="room-number">${r}</div><div class="room-empty-label">공실</div>`;
    }
    return`<div class="room-card ${clsMap[st]}" onclick="openModal('${id}','${r}')">
      <button class="edit-btn-small" onclick="event.stopPropagation();openModal('${id}','${r}')">✏️</button>
      ${inner}
    </div>`;
  }).join('');
}

// ══════════════════════════════════════
//  MODAL
// ══════════════════════════════════════
let modalCtx=null;

function toggleLongterm(){
  const on=document.getElementById('ltToggle').checked;
  document.getElementById('coWrap').style.opacity=on?'.4':'1';
  document.getElementById('inCheckOut').disabled=on;
  if(on) document.getElementById('inCheckOut').value='';
}

function openModal(bldgId,room,isNew){
  modalCtx={bldgId,room};
  const bg=BUILDINGS.find(b=>b.id===bldgId);
  const isGH=bg&&bg.group==='gh';
  document.getElementById('modalTitle').textContent=bg?bg.name:bldgId;
  const tag=document.getElementById('modalRoomTag');
  tag.textContent=bldgId+' – '+room;
  tag.className='modal-room-tag '+(isGH?'tag-room-gh':'tag-room-ibs');
  // reset
  document.getElementById('ltToggle').checked=false;
  document.getElementById('coWrap').style.opacity='1';
  document.getElementById('inCheckOut').disabled=false;
  document.getElementById('inCheckIn').value=TODAYSTR;
  document.getElementById('inCheckOut').value='';
  document.getElementById('inName').value='';
  document.getElementById('inCompany').value='';
  document.getElementById('inPaymentSelect').value='';
  document.getElementById('inPayment').value='';
  document.getElementById('inRemark').value='';
  renderModalBookings();
  document.getElementById('modalOverlay').classList.add('open');
}

function renderModalBookings(){
  const {bldgId,room}=modalCtx;
  const bk=DATA.filter(b=>b.bldgId===bldgId&&b.room===room).sort((a,b2)=>(pd(a.check_in)||new Date(0))-(pd(b2.check_in)||new Date(0)));
  if(!bk.length){document.getElementById('modalBookings').innerHTML='<div style="color:var(--text3);font-size:13px;padding:4px 0 8px">예약 내역 없음</div>';return}
  const stL={active:'투숙중',longterm:'장기투숙',upcoming:'예정',past:'퇴실',confirm:'확인필요',unknown:'미상'};
  const stC={active:'st-active',longterm:'st-long',upcoming:'st-upcoming',past:'st-past',confirm:'sp-confirm',unknown:'st-past'};
  document.getElementById('modalBookings').innerHTML=
    `<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text2);margin-bottom:8px">예약 내역 (${bk.length}건)</div>`+
    bk.map(b=>{
      const st=statusOf(b);const ns=nights(b);
      return`<div class="booking-entry" id="be-${b.id}">
        <div class="booking-entry-header">
          <div class="booking-entry-main">
            <div class="booking-entry-name">${b.name||'?'} <span style="font-weight:400;color:var(--text2);font-size:11px">${b.company||''}</span></div>
            <div class="booking-entry-meta">${b.check_in||'?'} → ${b.longterm?'장기투숙':b.check_out||'미정'}${ns?' · '+ns:''} ${b.payment?'· '+b.payment:''}</div>
          </div>
          <span class="booking-entry-status ${stC[st]}">${stL[st]}</span>
        </div>
        <div class="booking-entry-actions">
          <button class="btn btn-ghost btn-sm" onclick="toggleEdit('${b.id}')">✏️ 수정</button>
          <button class="btn btn-danger btn-sm" onclick="delBooking('${b.id}')">🗑 삭제</button>
        </div>
        <div class="booking-edit-form" id="ef-${b.id}">
          <div class="longterm-row" style="margin-bottom:10px">
            <label for="elt-${b.id}">🏡 장기투숙</label>
            <label class="toggle"><input type="checkbox" id="elt-${b.id}" ${b.longterm?'checked':''} onchange="toggleEditLT('${b.id}')"><span class="toggle-slider"></span></label>
          </div>
          <div class="date-row form-row">
            <div><div class="form-label">체크인</div><input class="form-input" type="date" id="ei-ci-${b.id}" value="${b.check_in||''}"></div>
            <div id="ecoWrap-${b.id}" style="opacity:${b.longterm?'.4':'1'}"><div class="form-label">체크아웃</div><input class="form-input" type="date" id="ei-co-${b.id}" value="${b.check_out||''}" ${b.longterm?'disabled':''}></div>
          </div>
          <div class="form-row"><div class="form-label">이름</div><input class="form-input" type="text" id="ei-n-${b.id}" value="${b.name||''}"></div>
          <div class="form-row"><div class="form-label">회사</div><input class="form-input" type="text" id="ei-c-${b.id}" value="${b.company||''}"></div>
          <div class="form-row"><div class="form-label">결제</div><input class="form-input" type="text" id="ei-p-${b.id}" value="${b.payment||''}"></div>
          <div style="display:flex;gap:8px;justify-content:flex-end">
            <button class="btn btn-ghost btn-sm" onclick="toggleEdit('${b.id}')">취소</button>
            <button class="btn btn-primary btn-sm" onclick="updateBooking('${b.id}')">✓ 확인</button>
          </div>
        </div>
      </div>`}).join('');
}

function toggleEdit(id){document.getElementById('ef-'+id).classList.toggle('open')}
function toggleEditLT(id){
  const on=document.getElementById('elt-'+id).checked;
  const w=document.getElementById('ecoWrap-'+id);
  w.style.opacity=on?'.4':'1';
  document.getElementById('ei-co-'+id).disabled=on;
  if(on) document.getElementById('ei-co-'+id).value='';
}
function updateBooking(id){
  const b=DATA.find(x=>x.id===id);if(!b)return;
  b.check_in  =document.getElementById('ei-ci-'+id).value;
  b.check_out =document.getElementById('ei-co-'+id).value;
  b.name      =document.getElementById('ei-n-'+id).value.trim();
  b.company   =document.getElementById('ei-c-'+id).value.trim();
  b.payment   =document.getElementById('ei-p-'+id).value.trim();
  b.longterm  =document.getElementById('elt-'+id).checked;
  syncUpdate(b);renderModalBookings();refreshAll();
}
function delBooking(id){
  const b=DATA.find(x=>x.id===id);
  if(!confirm(`"${b?.name||'이 예약'}"을 삭제할까요?`))return;
  DATA=DATA.filter(x=>x.id!==id);syncDelete(id);renderModalBookings();refreshAll();
}
function syncPay(){const v=document.getElementById('inPaymentSelect').value;if(v)document.getElementById('inPayment').value=v}
function saveBooking(){
  const ci=document.getElementById('inCheckIn').value;
  const co=document.getElementById('inCheckOut').value;
  const name=document.getElementById('inName').value.trim();
  const company=document.getElementById('inCompany').value.trim();
  const pay=document.getElementById('inPayment').value.trim();
  const rem=document.getElementById('inRemark').value.trim();
  const lt=document.getElementById('ltToggle').checked;
  if(!ci||!name){alert('체크인 날짜와 이름은 필수입니다');return}
  const bg=BUILDINGS.find(b=>b.id===modalCtx.bldgId);
  const newB = {id:genId(),group:bg.group,bldgId:modalCtx.bldgId,room:modalCtx.room,check_in:ci,check_out:lt?'':co,name,company,payment:pay,longterm:lt,remark:rem||undefined};
  DATA.push(newB);
  syncSave(newB);
  document.getElementById('ltToggle').checked=false;
  document.getElementById('coWrap').style.opacity='1';
  document.getElementById('inCheckOut').disabled=false;
  ['inCheckIn','inCheckOut','inName','inCompany','inPayment','inRemark'].forEach(id=>{document.getElementById(id).value=id==='inCheckIn'?TODAYSTR:''});
  document.getElementById('inPaymentSelect').value='';
  renderModalBookings();refreshAll();
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');modalCtx=null}
function closeModalOutside(e){if(e.target.id==='modalOverlay')closeModal()}

// ══════════════════════════════════════
//  GUESTS TABLE
// ══════════════════════════════════════
let guestFilter='all',sortKey='check_in',sortAsc=true;

function setGF(f,el){
  guestFilter=f;
  document.querySelectorAll('.fchip').forEach(c=>c.classList.remove('on'));
  if(el) el.classList.add('on');
  else{ // programmatic call – find matching chip
    document.querySelectorAll('.fchip').forEach(c=>{if(c.onclick&&c.onclick.toString().includes(`'${f}'`))c.classList.add('on')});
  }
  renderGuests();
}
function setSort(k){
  if(sortKey===k) sortAsc=!sortAsc; else{sortKey=k;sortAsc=true}
  document.querySelectorAll('.sort-arr').forEach(a=>{a.textContent='';a.classList.remove('active')});
  const el=document.getElementById('sa-'+k);if(el){el.textContent=sortAsc?'↑':'↓';el.classList.add('active')}
  renderGuests();
}
function renderGuests(){
  const q=(document.getElementById('guestSearch').value||'').toLowerCase();
  let rows=DATA.filter(b=>{
    const st=statusOf(b);
    if(guestFilter==='active') return st==='active';
    if(guestFilter==='longterm') return st==='longterm';
    if(guestFilter==='upcoming') return st==='upcoming';
    if(guestFilter==='past') return st==='past';
    if(guestFilter==='confirm') return st==='confirm';
    if(guestFilter==='GH') return b.group==='gh';
    if(guestFilter==='IBS') return b.group==='ibs';
    return true;
  });
  if(q) rows=rows.filter(b=>(b.name||'').toLowerCase().includes(q)||(b.company||'').toLowerCase().includes(q)||(b.room||'').toLowerCase().includes(q));
  rows.sort((a,b2)=>{let va=a[sortKey]||'',vb=b2[sortKey]||'';return sortAsc?va.localeCompare(vb):vb.localeCompare(va)});
  const stL={active:'투숙중',longterm:'장기투숙',upcoming:'예정',past:'퇴실',confirm:'확인필요',unknown:'미상'};
  const stC={active:'sp-active',longterm:'sp-long',upcoming:'sp-upcoming',past:'sp-past',confirm:'sp-confirm',unknown:'sp-confirm'};
  document.getElementById('guestTbody').innerHTML=rows.length?rows.map(b=>{
    const st=statusOf(b);const ns=nights(b);const isGH=b.group==='gh';
    return`<tr>
      <td><span class="bldg-tag ${isGH?'tag-gh':'tag-ibs'}">${isGH?'게하':'IBS'}</span></td>
      <td class="mono">${b.bldgId}-${b.room}</td>
      <td style="font-weight:500">${b.name||'—'}</td>
      <td style="color:var(--text2)">${b.company||'—'}</td>
      <td class="mono">${b.check_in||'—'}</td>
      <td class="mono" style="${st==='confirm'?'color:var(--red);font-weight:600':''}">${b.longterm?'장기투숙':b.check_out||'⚠ 미정'}</td>
      <td style="font-size:12px;color:var(--text2)">${b.payment||'—'}</td>
      <td class="mono">${ns||'—'}</td>
      <td><span class="status-pill ${stC[st]}">${stL[st]}</span></td>
      <td><button class="btn btn-ghost btn-sm" onclick="openModal('${b.bldgId}','${b.room}')">수정</button></td>
    </tr>`}).join(''):'<tr><td colspan="10"><div class="empty">검색 결과 없음</div></td></tr>';
}

// ══════════════════════════════════════
//  REFRESH
// ══════════════════════════════════════
function refreshAll(){
  renderOverview();
  if(document.getElementById('tab-roommap').classList.contains('active')){renderBldgList();if(activeBldg)selectBldg(activeBldg)}
  if(document.getElementById('tab-guests').classList.contains('active'))renderGuests();
}
